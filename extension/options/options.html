<!DOCTYPE html>
<html>
<head>
  <title>KAIO Presence Settings</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 20px; max-width: 400px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input[type="text"] { width: 100%; padding: 8px; box-sizing: border-box; }
    button { padding: 8px 12px; background: #007bff; color: white; border: none; cursor: pointer; border-radius: 4px; }
    button:hover { background: #0056b3; }
    #status { margin-top: 15px; color: green; font-weight: bold; }
  </style>
</head>
<body>
  <h2>KAIO Settings</h2>
  <div class="form-group">
    <label for="backendUrl">Backend URL (e.g., http://localhost:8000)</label>
    <input type="text" id="backendUrl" placeholder="http://localhost:8000">
  </div>
  <div class="form-group">
    <label for="apiKey">API Key (Generated by Backend)</label>
    <input type="text" id="apiKey" placeholder="Enter API Key">
  </div>
  <button id="saveBtn">Save Settings</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
